<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta property="og:title" content="Drumjot" />
    <title>Drumjot</title>
    <!-- Bricolage Grotesque variable font (opsz / wdth / wght axes).
         Used as the product font everywhere; the wdth axis is also driven
         live on the lyrics row to tighten glyphs at low zoom. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,200..800&display=swap"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        /* `100vh` on mobile measures against the LARGE viewport (browser
           UI hidden), so content pinned at `bottom: 0` (the playback
           bar) sits behind a visible address bar until the user
           scrolls to retract it. `100dvh` is the dynamic viewport
           height: it recomputes as the address bar shows/hides, so
           the playback bar stays above the address bar when it's up
           and re-anchors to the true bottom when it's down. The `vh`
           line is the fallback for any browser that doesn't support
           `dvh`; modern evergreen (per AGENTS.md §5.11) all do. */
        height: 100vh;
        height: 100dvh;
        background: #fff6e8;
        font-family:
          'Bricolage Grotesque',
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        color: #2b2b2b;
      }
      /* Pre-bundle dark-mode body chrome so the very first paint matches
         the resolved theme. The OS preference applies automatically when
         no explicit override is set; the inline boot script below sets
         data-theme="light|dark" from localStorage so a user override
         beats the media query. design_tokens.css then takes over once
         the JS bundle has loaded the design system. */
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #1a1814;
          color: #ece8de;
        }
      }
      html[data-theme='dark'],
      html[data-theme='dark'] body {
        background: #1a1814;
        color: #ece8de;
      }
      html[data-theme='light'],
      html[data-theme='light'] body {
        background: #fff6e8;
        color: #2b2b2b;
      }
      #app {
        height: 100%;
        width: 100%;
      }
    </style>
    <script>
      // Synchronous theme bootstrap; runs before any other script /
      // stylesheet so the resolved theme is in place for first paint.
      // The full theme controller (src/theme.ts) reads the same
      // localStorage key once the bundle loads and takes over from here.
      (function () {
        try {
          var m = localStorage.getItem('drumjot.theme');
          if (m === 'light' || m === 'dark') {
            document.documentElement.setAttribute('data-theme', m);
          }
        } catch (e) {
          // No-op: theme falls back to OS preference (prefers-color-scheme).
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
