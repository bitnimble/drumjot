<!-- Mirror the product font from the app's index.html so stories render in
     Bricolage Grotesque (otherwise IconButton glyphs / labels, etc. fall
     back to a system font and look wrong). Storybook injects this file into
     the preview iframe's <head>. The :root design tokens come from
     design_tokens.css (imported in preview.ts); the body font-family lives
     in the app's index.html <style>, so it has to be replicated here too. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,200..800&display=swap"
/>
<style>
  body {
    font-family:
      'Bricolage Grotesque',
      system-ui,
      -apple-system,
      'Segoe UI',
      Roboto,
      sans-serif;
    color: #2b2b2b;
  }
</style>
