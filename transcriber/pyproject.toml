[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "drumjot-transcriber"
version = "0.1.0"
description = "Off-the-shelf + LLM drum transcription service for Drumjot."
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "python-multipart>=0.0.9",
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
    # Audio separation + analysis
    "audio-separator[gpu]>=0.44",
    "librosa>=0.10.2",
    "soundfile>=0.12",
    "scipy>=1.11",
    "numpy>=1.26,<2",
    # Beat tracking + downbeat detection (the rhythmic structure backbone)
    "madmom @ git+https://github.com/CPJKU/madmom.git@main",
    "cython>=3.0",
    # Transcription evaluation + MIDI
    "mir_eval>=0.7",
    "mido>=1.3",
    # LLM
    "anthropic>=0.40",
    # Misc
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["ruff>=0.6", "pytest>=8"]

[tool.setuptools.packages.find]
include = ["app*"]
