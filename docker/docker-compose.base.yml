# Shared base for docker-compose.{prod,dev}.yml. Don't invoke this file
# directly - pick a variant:
#   docker compose -f docker/docker-compose.prod.yml up --build   # bundled frontend
#   docker compose -f docker/docker-compose.dev.yml  up --build   # vite dev mount
#
# What lives here: everything that doesn't vary between prod and dev -
# image build, container env_file, host volume mounts, non-root user,
# restart policy. Port mappings, the DISABLE_FRONTEND env, AND GPU
# passthrough live in the variant files: the first two flip between modes,
# and `gpus: all` has to be set directly on each variant service because
# `extends:` doesn't reliably apply it (see the GPU note further down).
#
# Notes:
# - GPU passthrough (`gpus: all`) lives in docker-compose.{dev,prod}.yml,
#   not here, and requires the NVIDIA Container Toolkit on the host. No
#   GPU? Comment out that line and the container falls back to CPU (slow).
services:
  drumjot:
    build:
      # Build context = repo root (this compose file lives in ./docker/,
      # hence `..`). The image bundles both the React frontend (built by
      # the bun stage in the Dockerfile) and the Python transcriber, so
      # the context needs to see both `src/` and `transcriber/`.
      context: ..
      dockerfile: docker/Dockerfile
    image: drumjot:dev
    container_name: drumjot
    # Run as non-root UID:GID 1000:1000 so bind-mounted artifacts (debug,
    # benchmark results) and volume contents (models cache) end up owned
    # by the host user rather than root. Image's USER directive sets the
    # same; this is a redundant runtime guarantee.
    user: '1000:1000'
    env_file:
      # Loads ANTHROPIC_API_KEY, LLM_MODEL, INSTRUMENT_CONCURRENCY,
      # CORS_ORIGINS, DEVICE, BEAT_INPUT_DEFAULT, DEBUG_DIR. Values map straight into the
      # container env; no compose-side `${VAR}` indirection needed.
      # DISABLE_FRONTEND is intentionally NOT loaded from here - each
      # variant sets it explicitly via `environment:` so the mode
      # toggle isn't accidentally pinned in a shared env file.
      - ../transcriber/.env
    volumes:
      # Host data root for every persisted bind mount below (model cache, debug,
      # outputs, lyrics cache, benchmark fixtures/results). Defaults to the
      # local box's /codebox-workspace/drumjot; point it at a LOCAL-SSD path on
      # another host (e.g. the gaming PC) via DRUMJOT_DATA_ROOT in the shell
      # env or a docker/.env file. Keep it on local disk: NFS is far too slow
      # for the multi-GB model cache (separators + the MERT encoder).
      #
      # /models holds ALL model weights and persists across container recreation:
      # the auto-downloaded separators + MERT/HF + torch caches, PLUS the
      # user-provided learned-onset model -- drop its run dir (model.pt +
      # meta.json) into models-cache/learned-onsets/ to enable the default
      # learned backend (otherwise learned transcribes error; onset_backend=adtof
      # needs no model).
      - ${DRUMJOT_DATA_ROOT:-/codebox-workspace/drumjot}/models-cache:/models
      # Debug artifact volume. Files written here by the transcriber
      # (drum stems, per-instrument stems, beats.json, initial.jot, etc.)
      # are immediately accessible on the host under ./debug/ so you can
      # listen back to stems or replay the refinement loop.
      - ${DRUMJOT_DATA_ROOT:-/codebox-workspace/drumjot}/debug:/debug
      # Stem deliverables (drumless + drum-only FLACs). Always populated
      # per request and served back to the caller as URLs. Kept separate
      # from /debug so the operator can prune debug freely without
      # invalidating live response URLs the frontend is still using.
      - ${DRUMJOT_DATA_ROOT:-/codebox-workspace/drumjot}/outputs:/outputs
      # Cache for /lyrics/align (separated vocals + CTC forced-alignment
      # results). Content-addressed, LRU-bounded. Safe to nuke; entries
      # refill on demand. See `app/cache.py`.
      - ${DRUMJOT_DATA_ROOT:-/codebox-workspace/drumjot}/cache:/cache
      # Benchmark fixture + output volumes. Pasting dataset files into
      # transcriber/benchmarks/datasets/<dataset>/ on the host makes
      # them visible inside the container; benchmark results land in
      # ./benchmarks/results/ on the host so partial runs are inspectable
      # without docker cp.
      - ${DRUMJOT_DATA_ROOT:-/codebox-workspace/drumjot}/benchmarks/datasets:/app/benchmarks/datasets
      - ${DRUMJOT_DATA_ROOT:-/codebox-workspace/drumjot}/benchmarks/results:/app/benchmarks/results
    # GPU passthrough (`gpus: all`) is intentionally NOT here. `extends:` does
    # not apply the compose-spec `gpus` field to the created container on all
    # engines: it renders in `docker compose config` but the container comes up
    # with HostConfig.DeviceRequests == null (observed on docker-ce 28.1.1 +
    # compose 2.35, native docker in WSL) -> torch.cuda.is_available() is False
    # -> audio-separator silently runs CPU-only. A standalone service with
    # `gpus: all` works fine, so the field must be set DIRECTLY on each variant
    # service rather than inherited. See the `gpus: all` line in
    # docker-compose.{dev,prod}.yml.
    mem_limit: 8g
    memswap_limit: 8g
    restart: unless-stopped
