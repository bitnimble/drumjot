# Prod-mode orchestration. Bundles the pre-built SPA + transcriber API
# into a single drumjot container: Caddy inside the container serves
# `/app/web` on :5173 and reverse-proxies /api/* back to the transcriber
# on :8001. Mirrors what's actually deployed on kumo.dev.
#
# Usage (run from the repo root):
#   cp transcriber/.env.example transcriber/.env   # populate ANTHROPIC_API_KEY
#   # The default (learned) onset model is MOUNTED, not baked: drop the run
#   # dir's model.pt + meta.json into the models cache at
#   # ${DRUMJOT_DATA_ROOT}/models-cache/learned-onsets/. Without it, learned
#   # transcribes error clearly; onset_backend=adtof needs no model.
#   docker compose -f docker/docker-compose.prod.yml up --build
#
# Then open http://localhost:5173 (SPA + /api proxy); the transcriber API is
# also exposed directly on :8861.
#
# Deploying on another host (e.g. a gaming PC):
#   - Volumes: the persisted dirs default to /codebox-workspace/drumjot/* (the
#     local box). Point them at LOCAL SSD via DRUMJOT_DATA_ROOT (shell env or a
#     docker/.env next to this file), e.g. DRUMJOT_DATA_ROOT=$HOME/drumjot_data.
#     Don't put them on NFS, the multi-GB model cache will crawl.
#   - Learned-onset model: drop the run dir's model.pt + meta.json into
#     ${DRUMJOT_DATA_ROOT}/models-cache/learned-onsets/ (it persists in the same
#     /models cache as the other weights). If absent, only a learned transcribe
#     errors (clearly), never startup. Use onset_backend=adtof to run without it.
#   - GPU: needs the NVIDIA Container Toolkit + a driver new enough for the
#     image's CUDA 12.8 torch (>=570; a CUDA-13/580+ driver is forward-
#     compatible in-container). On WSL, verify CUDA init on the first run
#     (`docker compose ... logs`); the cu128-on-WSL caveat in training/
#     pyproject is about NATIVE wheels, not the containerized runtime. No GPU =
#     comment out the `gpus: all` line in this file (CPU fallback, slow).
#   - First learned transcribe after a fresh /models volume downloads the
#     frozen MERT-v1-330M encoder (~1.3 GB) into the HF cache once.
#
# For live-reload frontend work without an image rebuild, use
# docker/docker-compose.dev.yml instead. Both files extend
# docker/docker-compose.base.yml for the shared image / volume / env_file
# configuration (GPU passthrough is set per-variant, not in base; see below).

services:
  drumjot:
    extends:
      file: docker-compose.base.yml
      service: drumjot
    # GPU passthrough. Set HERE, not in the base file: `extends:` doesn't apply
    # the `gpus` field to the created container on some engines (renders in
    # `compose config` but DeviceRequests comes up null -> CPU-only). See the
    # base file's GPU note. No GPU on this host? Comment this out (CPU fallback).
    gpus: all
    environment:
      # Tells docker/entrypoint.sh to include Caddyfile.frontend
      # when assembling the runtime Caddyfile, binding the :5173
      # listener that serves the bundled SPA. Explicit overrides any
      # stray value the env_file might be carrying.
      DISABLE_FRONTEND: '0'
    ports:
      # Frontend (bundled SPA + /api/* proxy).
      - 5173:5173
      # Transcriber API. Exposed for direct access (benchmark client,
      # debug curls, healthcheck from outside). The frontend on :5173
      # talks to it internally, so this is optional for browser users.
      - 8861:8001
