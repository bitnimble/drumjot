# Dev-mode orchestration. The transcriber half (API on :8001) runs in
# the drumjot container as in prod. The frontend half is replaced by a
# separate bun container that bind-mounts the host project tree and
# runs `bun run dev`, so frontend edits on the host are picked up live
# (no rebuild, no image push). The host Caddy still talks to localhost
# :5173 and gets routed to vite instead of the bundled Caddy SPA.
#
# Usage (run from the repo root):
#   cp transcriber/.env.example transcriber/.env   # populate ANTHROPIC_API_KEY
#   docker compose -f docker/docker-compose.dev.yml up --build
#
# On a host other than the local box, set two env vars (docker/.env or shell):
#   - DRUMJOT_REPO_DIR  = the repo's absolute path as the Docker daemon sees it
#     (feeds the frontend-dev + proxy bind mounts; native/WSL Docker = the repo
#     path, e.g. $HOME/code/drumjot).
#   - DRUMJOT_DATA_ROOT = a local-SSD dir for the model cache / debug / outputs
#     (see docker-compose.base.yml). The transcriber half runs the same image as
#     prod, so the learned-onset model goes in the same place
#     (${DRUMJOT_DATA_ROOT}/models-cache/learned-onsets/; see prod header).
#
# Routing (same external surface as prod):
#   host :5173       -> frontend-proxy (Caddy) container :5173
#                         /api/* -> drumjot:8001 (transcriber edge router)
#                         else   -> frontend-dev:5173 (vite dev server)
#   host :8861       -> drumjot container :8001 (transcriber API, direct)
#
# The frontend-proxy sits in front of Vite on purpose: Vite under Bun
# can't relay the transcriber's chunked NDJSON streaming responses (Bun
# node:http proxy bug, oven-sh/bun#5737 / #28396), so we route /api with
# Caddy instead of Vite's own proxy. See Caddyfile.dev.
#
# Notes:
# - First `up --build` populates the `frontend_dev_node_modules` named
#   volume by running `bun install` inside the container. Subsequent
#   starts reuse it. If you update package.json / bun.lock on the host,
#   nuke the volume to force a fresh install:
#     docker compose -f docker/docker-compose.dev.yml down
#     docker volume rm drumjot_frontend_dev_node_modules
# - vite.config.ts pins `allowedHosts` to a hardcoded list. If you want
#   to reach the dev server through a non-listed hostname, add it
#   there or vite returns 403 with a "Blocked request" page.

services:
  drumjot:
    extends:
      file: docker-compose.base.yml
      service: drumjot
    # GPU passthrough. Set HERE, not in the base file: `extends:` doesn't apply
    # the `gpus` field to the created container on some engines (renders in
    # `compose config` but DeviceRequests comes up null -> CPU-only). See the
    # base file's GPU note. No GPU on this host? Comment this out (CPU fallback).
    gpus: all
    environment:
      # Tells docker/entrypoint.sh to skip Caddyfile.frontend when
      # assembling the runtime Caddyfile - the in-container :5173
      # listener never binds, freeing the host port for the dev service
      # below. Explicit overrides any stray value the env_file might
      # be carrying.
      DISABLE_FRONTEND: '1'
    ports:
      # API only - host :5173 belongs to the frontend-proxy below.
      - 8861:8001

  frontend-dev:
    image: oven/bun:1.3.14
    container_name: drumjot-frontend-dev
    working_dir: /workdir
    # Idempotent install on cold-start (skipped once node_modules is
    # populated in the named volume), then handoff to vite. `exec` so
    # vite is PID 1 and signal handling stays clean. `--host 0.0.0.0`
    # is needed inside the container so vite binds the external
    # interface; vite.config.ts's `host: true` already does the same
    # but the explicit flag survives any future config edit.
    command:
      - sh
      - -c
      - |
        [ -d node_modules/.bin ] || bun install --frozen-lockfile
        exec bun run dev --host 0.0.0.0 --port 5173
    # Internal only: the frontend-proxy (Caddy) below owns host :5173 and
    # reverse-proxies non-/api traffic here. Vite still binds 0.0.0.0 (see
    # --host) so the proxy can reach it across the compose network.
    expose:
      - '5173'
    volumes:
      # Bind the entire repo so vite watches the live tree. The source is the
      # path the DOCKER DAEMON sees the repo at (not necessarily the CLI's cwd):
      # the local box runs its daemon in a VM where the tree is bridged to the
      # /capsule/... path below, hence the absolute default. On a normal host
      # (e.g. the gaming PC, native/WSL Docker) set DRUMJOT_REPO_DIR to the
      # repo's absolute path (e.g. $HOME/code/drumjot) in a docker/.env or the
      # shell. The same var feeds the Caddyfile.dev mount on frontend-proxy.
      - ${DRUMJOT_REPO_DIR:-/capsule/config/docker-volume/codebox/home/bitnimble/code/drumjot}:/workdir
    # No environment needed: Vite no longer proxies /api (the frontend-proxy
    # below routes it to the transcriber), so it doesn't read TRANSCRIBER_URL.
    depends_on:
      - drumjot
    restart: unless-stopped

  # Edge proxy in front of the Bun-hosted Vite dev server. Owns host
  # :5173, routes /api/* straight to the transcriber (drumjot:8001) and
  # everything else to Vite - keeping Bun's broken streaming proxy out of
  # the /api path. See Caddyfile.dev for the routing rationale.
  frontend-proxy:
    image: caddy:2-alpine
    container_name: drumjot-frontend-proxy
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    ports:
      - 5173:5173
    volumes:
      - ${DRUMJOT_REPO_DIR:-/capsule/config/docker-volume/codebox/home/bitnimble/code/drumjot}/docker/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend-dev
      - drumjot
    restart: unless-stopped
